name: Build Android APK

on:
  push:
    branches:
      - master
    paths:
      - 'clock-app/**'
      - '.github/workflows/android.yml'
  workflow_dispatch:

jobs:
  build-android:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    env:
      ANDROID_HOME: /opt/android-sdk
      ANDROID_SDK_ROOT: /opt/android-sdk
      NDK_HOME: /opt/android-sdk/ndk/26.1.10909125

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install npm dependencies
        working-directory: clock-app
        run: npm ci

      - name: Cache node_modules
        uses: actions/cache@v4
        with:
          path: clock-app/node_modules
          key: ${{ runner.os }}-node-modules-${{ hashFiles('clock-app/package-lock.json') }}
          restore-keys: ${{ runner.os }}-node-modules-

      - name: Set up Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-linux-android,armv7-linux-androideabi,i686-linux-android,x86_64-linux-android

      - name: Cache Rust & Cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo
            ~/.rustup
            clock-app/src-tauri/target
          key: ${{ runner.os }}-rust-${{ hashFiles('clock-app/**/Cargo.lock') }}
          restore-keys: ${{ runner.os }}-rust-

      - name: Install Android SDK & NDK
        uses: android-actions/setup-android@v3
        with:
          api-level: 33
          ndk: 26.1.10909125
          arch: arm64-v8a
          force-avd-creation: false

      - name: Initialize Android project
        working-directory: clock-app
        run: npx tauri android init -- --ci

      - name: Build debug APK
        working-directory: clock-app
        run: npx tauri build --debug

      - name: Build release APK
        working-directory: clock-app
        run: npx tauri build

      - name: Find APK files
        id: find-apk
        shell: bash
        run: |
          DEBUG_APK=$(find clock-app/src-tauri/target -type f -name "*.apk" -path "*debug*android*" | head -1 || true)
          RELEASE_APK=$(find clock-app/src-tauri/target -type f -name "*.apk" -path "*release*android*" -not -path "*unsigned*" | head -1 || true)
          echo "debug=$DEBUG_APK" >> $GITHUB_OUTPUT
          echo "release=$RELEASE_APK" >> $GITHUB_OUTPUT

      - name: Upload debug APK
        if: steps.find-apk.outputs.debug != ''
        uses: actions/upload-artifact@v4
        with:
          name: timestar-debug.apk
          path: ${{ steps.find-apk.outputs.debug }}
          retention-days: 30

      - name: Upload release APK
        if: steps.find-apk.outputs.release != ''
        uses: actions/upload-artifact@v4
        with:
          name: timestar-release.apk
          path: ${{ steps.find-apk.outputs.release }}
          retention-days: 90

      - name: Summary
        run: |
          echo "## Build Complete" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "Generated APKs:" >> $GITHUB_STEP_SUMMARY
          find clock-app/src-tauri/target -type f -name "*.apk" -path "*android*" 2>/dev/null | while read f; do
            echo "- $(basename "$f")" >> $GITHUB_STEP_SUMMARY
          done
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "Download artifacts from the Actions tab." >> $GITHUB_STEP_SUMMARY